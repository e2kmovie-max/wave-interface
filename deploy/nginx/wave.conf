# Wave — nginx site config.
#
# Drops in front of the Next.js web (3000) and proxies websockets + streamed
# /api/rooms/*/stream bytes without buffering, so the room sync stays
# real-time and playback starts as soon as the first bytes arrive from the
# streaming instance.
#
# Adjust `server_name` and the certificate paths before reloading nginx.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name wave.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wave.example.com;

    ssl_certificate     /etc/letsencrypt/live/wave.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wave.example.com/privkey.pem;

    # Generic Next.js proxy — most requests live here.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
    }

    # Static Next.js assets — cache hard, they're content-hashed.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Room-sync websockets. `Upgrade` + Connection are mandatory.
    location ~ ^/api/rooms/[^/]+/ws$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # The streamed video bytes. Buffering MUST be off so playback starts as
    # fast as it would in a direct Next.js connection.
    location ~ ^/api/rooms/[^/]+/stream$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
